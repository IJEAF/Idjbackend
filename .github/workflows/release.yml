name: Release — Build & Push

on:
  release:
    types: [published]

jobs:
  build-release:
    name: Build & Push Release Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract release version
        id: version
        run: |
          VERSION=${{ github.event.release.tag_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/ijeaf/ibackend:latest .

      - name: Test Docker image
        run: |
          docker run --rm ghcr.io/ijeaf/ibackend:latest java -version

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ijeaf/ibackend:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results-release
          path: trivy-results.sarif
          retention-days: 7

      - name: Tag Docker image for release
        run: |
          docker tag ghcr.io/ijeaf/ibackend:latest ghcr.io/ijeaf/ibackend:${{ steps.version.outputs.version }}
          docker tag ghcr.io/ijeaf/ibackend:latest ghcr.io/ijeaf/ibackend:latest

      - name: Push Docker image
        run: |
          docker push ghcr.io/ijeaf/ibackend:${{ steps.version.outputs.version }}
          docker push ghcr.io/ijeaf/ibackend:latest

      - name: Create release summary
        run: |
          echo "# 🐳 Docker Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags Published:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/ijeaf/ibackend:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/ijeaf/ibackend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull Command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/ijeaf/ibackend:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Clean up Docker images
        if: always()
        run: |
          docker rmi ghcr.io/ijeaf/ibackend:latest ghcr.io/ijeaf/ibackend:${{ steps.version.outputs.version }} || true
