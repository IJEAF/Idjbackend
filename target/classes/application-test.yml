# Profil TEST — utilisé par le CI et les tests d'intégration
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ijeaf_test}
    username: ${DB_USERNAME:ijeaf}
    password: ${DB_PASSWORD:ijeaf_dev_password}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.ijeaf: INFO

