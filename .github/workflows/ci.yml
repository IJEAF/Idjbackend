name: CI — Build & Test

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

jobs:
  build:
    name: Build, Test & Quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ijeaf_test
          POSTGRES_USER: ijeaf
          POSTGRES_PASSWORD: ijeaf_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: ./mvnw clean compile -q
        env:
          JWT_SECRET: ci_secret_key_256_bits_long_for_testing_purposes_only_not_for_prod

      - name: Run Tests
        run: ./mvnw test
        env:
          JWT_SECRET: ci_secret_key_256_bits_long_for_testing_purposes_only_not_for_prod
          DB_URL: jdbc:postgresql://localhost:5432/ijeaf_test
          DB_USERNAME: ijeaf
          DB_PASSWORD: ijeaf_dev_password

      - name: JaCoCo Coverage Report
        run: ./mvnw jacoco:report
        env:
          JWT_SECRET: ci_secret_key_256_bits_long_for_testing_purposes_only_not_for_prod

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Checkstyle
        run: ./mvnw checkstyle:check
        env:
          JWT_SECRET: ci_secret_key_256_bits_long_for_testing_purposes_only_not_for_prod
        continue-on-error: true

